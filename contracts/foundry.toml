[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "paris"        # X Layer zkEVM: avoid PUSH0 (Shanghai); paris is safe
remappings = ["forge-std/=lib/forge-std/src/"]

[rpc_endpoints]
xlayer_testnet = "https://testrpc.xlayer.tech"

# Verify on OKLink after deploy, e.g.:
#   forge verify-contract <addr> src/TerritoryMap.sol:TerritoryMap \
#     --chain-id 195 --verifier oklink --verifier-url <oklink-api>
